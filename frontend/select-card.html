<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG GTO Bingo - Select Card</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .game-id {
            font-size: 14px;
            color: #94a3b8;
        }

        .game-id span {
            font-size: 24px;
            font-weight: bold;
            color: #4a90e2;
            margin-left: 8px;
        }

        .balance {
            background: #1e293b;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #4ade80;
            border: 1px solid #4ade8033;
        }

        /* Game Info Bar */
        .info-bar {
            display: flex;
            justify-content: space-between;
            background: #1e293b;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid #334155;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: #94a3b8;
            display: block;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 18px;
            font-weight: bold;
            color: #60a5fa;
        }

        .prize-pool {
            color: #fbbf24;
        }

        /* Section Title */
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #e2e8f0;
            letter-spacing: 1px;
        }

        /* Card Number Grid */
        .card-grid {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid #334155;
        }

        .grid-numbers {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 4px;
            max-height: 300px;
            overflow-y: auto;
            padding: 4px;
            background: #0f172a;
            border-radius: 8px;
        }

        .grid-number {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 4px;
            font-size: 10px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .grid-number:hover {
            background: #2d3a4f;
            color: white;
            border-color: #60a5fa;
        }

        .grid-number.selected {
            background: #3b82f6;
            color: white;
            border-color: #93c5fd;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }

        .grid-number.special {
            background: linear-gradient(135deg, #3b82f620 0%, #8b5cf620 100%);
            border-color: #8b5cf6;
            color: #c4b5fd;
        }

        .range-indicator {
            text-align: center;
            color: #60a5fa;
            font-size: 14px;
            font-weight: bold;
            padding: 10px;
            margin-top: 10px;
            background: #0f172a;
            border-radius: 8px;
            border: 1px solid #3b82f6;
        }

        /* Card Preview */
        .preview-container {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #334155;
            display: none;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .preview-title {
            font-size: 20px;
            font-weight: bold;
            color: #60a5fa;
        }

        .preview-price {
            background: #059669;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        /* Bingo Grid */
        .bingo-grid {
            width: 100%;
            border-collapse: collapse;
            background: #0f172a;
            border-radius: 8px;
            overflow: hidden;
        }

        .bingo-grid th {
            background: #2d3a4f;
            color: #60a5fa;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #334155;
        }

        .bingo-grid td {
            border: 1px solid #334155;
            padding: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .bingo-grid .free {
            background: #fbbf24;
            color: #1e293b;
            font-weight: bold;
            font-size: 18px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 16px;
            margin: 24px 0;
        }

        .confirm-btn {
            flex: 2;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .cancel-btn {
            flex: 1;
            background: #475569;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cancel-btn:hover {
            background: #64748b;
        }

        /* How to Play */
        .how-to-play {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
            border: 1px solid #334155;
        }

        .how-to-play h3 {
            color: #60a5fa;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .how-to-play ol {
            padding-left: 20px;
            color: #94a3b8;
        }

        .how-to-play li {
            margin-bottom: 6px;
            font-size: 14px;
        }

        /* Scrollbar */
        .grid-numbers::-webkit-scrollbar {
            width: 6px;
        }

        .grid-numbers::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .grid-numbers::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .grid-numbers::-webkit-scrollbar-thumb:hover {
            background: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="game-id">
                Game ID <span>MK</span>
            </div>
            <div class="balance" id="balance">$0</div>
        </div>

        <!-- Game Info Bar -->
        <div class="info-bar">
            <div class="info-item">
                <span class="info-label">Players</span>
                <span class="info-value" id="playerCount">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">Prize Pool</span>
                <span class="info-value prize-pool" id="prizePool">$0</span>
            </div>
        </div>

        <!-- Game Title (only #10) -->
        <div class="section-title">#10 BIG GTO</div>

        <!-- Card Number Grid (1-1000) -->
        <div class="card-grid">
            <div class="grid-numbers" id="cardGrid"></div>
            <div class="range-indicator">1 - 1000</div>
        </div>

        <!-- Card Preview -->
        <div class="preview-container" id="previewContainer">
            <div class="preview-header">
                <span class="preview-title">Card #<span id="selectedCardNumberDisplay"></span></span>
                <span class="preview-price">$50</span>
            </div>
            <table class="bingo-grid" id="bingoPreview">
                <!-- Preview will be inserted here -->
            </table>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="confirm-btn" id="confirmBtn" onclick="confirmSelection()" disabled>Confirm</button>
            <button class="cancel-btn" onclick="cancelSelection()">Cancel</button>
        </div>

        <!-- How to Play -->
        <div class="how-to-play">
            <h3>📖 How to Play</h3>
            <ol>
                <li>Choose a card number from the grid (1-1000)</li>
                <li>Preview your 5×5 BINGO card</li>
                <li>Click Confirm to purchase</li>
                <li>Wait for game to start</li>
            </ol>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let selectedCardNumber = null;
        let userBalance = 0;
        let userId = null;

        // ---------- USER ID ----------
        try {
            const user = tg.initDataUnsafe.user;
            if (user && user.id) {
                userId = user.id;
                console.log('✅ User ID:', userId);
            } else {
                console.warn('⚠️ No Telegram user – demo mode');
            }
        } catch (e) {
            console.warn('⚠️ Could not get user – demo mode');
        }

        // ---------- BALANCE LOADING ----------
        async function loadBalance() {
            const balanceEl = document.getElementById('balance');
            if (!balanceEl) return;

            if (!userId) {
                balanceEl.textContent = '$1000 (demo)';
                userBalance = 1000;
                return;
            }

            try {
                const res = await fetch(`/api/user-balance/${userId}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                userBalance = data.balance;
                balanceEl.textContent = `$${data.balance}`;
            } catch (err) {
                console.error('❌ Balance fetch failed:', err);
                balanceEl.textContent = '?';
                userBalance = 0;
            }
        }

        // ---------- GAME STATS ----------
        async function loadGameStats() {
            try {
                const res = await fetch('/api/game-state');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const state = await res.json();
                // We only care about game #10 now
                document.getElementById('playerCount').textContent = state['10']?.playerCount || 0;
                document.getElementById('prizePool').textContent = `$${state['10']?.prizePool || 0}`;
            } catch (err) {
                console.warn('⚠️ Could not load game stats', err);
            }
        }

        // ---------- GRID GENERATION (1‑1000) ----------
        function generateCardGrid() {
            const grid = document.getElementById('cardGrid');
            let html = '';
            for (let i = 1; i <= 1000; i++) {
                // Highlight number 10 as special (optional)
                const isSpecial = (i === 10);
                const classes = ['grid-number'];
                if (isSpecial) classes.push('special');
                html += `<div class="${classes.join(' ')}" data-number="${i}" onclick="selectNumber(${i})">${i}</div>`;
            }
            grid.innerHTML = html;
        }

        // ---------- SELECT NUMBER ----------
        window.selectNumber = function(number) {
            document.querySelectorAll('.grid-number').forEach(el => el.classList.remove('selected'));
            const target = document.querySelector(`[data-number="${number}"]`);
            if (target) {
                target.classList.add('selected');
                selectedCardNumber = number;
                document.getElementById('selectedCardNumberDisplay').textContent = number;
                document.getElementById('previewContainer').style.display = 'block';
                document.getElementById('confirmBtn').disabled = false;
                updatePreview();
            }
        };

        // ---------- CARD GENERATION (only #10) ----------
        function generateCard(seed) {
            // Deterministic RNG based on seed (card number)
            function rng() {
                seed = (seed * 9301 + 49297) % 233280;
                return seed / 233280;
            }

            // Traditional BINGO columns: B:1-15, I:16-30, N:31-45, G:46-60, O:61-75
            const card = [];
            for (let col = 0; col < 5; col++) {
                const min = col * 15 + 1;
                const max = min + 14;
                const colNums = [];
                while (colNums.length < 5) {
                    const n = Math.floor(rng() * (max - min + 1)) + min;
                    if (!colNums.includes(n)) colNums.push(n);
                }
                colNums.sort((a, b) => a - b);
                for (let row = 0; row < 5; row++) {
                    if (!card[row]) card[row] = [];
                    card[row][col] = colNums[row];
                }
            }
            // Free space in the center
            card[2][2] = '★';
            return card;
        }

        function updatePreview() {
            // Use the selected card number as seed
            const card = generateCard(selectedCardNumber);
            renderPreview(card);
        }

        function renderPreview(card) {
            const table = document.getElementById('bingoPreview');
            let html = '<tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>';
            for (let r = 0; r < 5; r++) {
                html += '<tr>';
                for (let c = 0; c < 5; c++) {
                    const val = card[r][c];
                    const cls = (val === '★') ? 'free' : '';
                    html += `<td class="${cls}">${val}</td>`;
                }
                html += '</tr>';
            }
            table.innerHTML = html;
        }

        // ---------- PURCHASE ----------
        window.confirmSelection = function() {
            if (!selectedCardNumber) {
                tg.showAlert('Please select a card number');
                return;
            }
            const price = 50;
            if (userBalance < price) {
                tg.showAlert(`Insufficient balance! Need $${price}`);
                return;
            }
            const cardNumbers = generateCard(selectedCardNumber);
            tg.sendData(JSON.stringify({
                type: 'BUY_CARD',
                gameId: '10',
                cardNumber: selectedCardNumber,
                price,
                cardData: {
                    type: 'bingo',
                    numbers: cardNumbers,
                    gameId: '10'
                }
            }));
            localStorage.setItem('currentGame', '10');
            localStorage.setItem('currentCard', JSON.stringify({
                number: selectedCardNumber,
                type: 'bingo',
                numbers: cardNumbers
            }));
            tg.showAlert(`✅ Card #${selectedCardNumber} purchased!`);
            setTimeout(() => window.location.href = 'game.html', 1500);
        };

        window.cancelSelection = function() {
            window.location.href = 'index.html';
        };

        // ---------- INIT ----------
        generateCardGrid();
        loadBalance();
        loadGameStats();
        setInterval(loadGameStats, 10000);
    </script>
</body>
</html>
