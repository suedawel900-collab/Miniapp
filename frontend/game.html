<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Game - BIG GTO</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="game-header">
            <div class="header-top">
                <button class="back-button" onclick="location.href='index.html'">←</button>
                <h1>🎯 MK BINGO</h1>
                <div class="balance-display" id="balance">$1000</div>
            </div>
            
            <div class="game-info-bar">
                <div class="info-item">
                    <span class="label">Game ID</span>
                    <span class="value" id="gameId">7S</span>
                </div>
                <div class="info-item">
                    <span class="label">Players</span>
                    <span class="value" id="playerCount">0</span>
                </div>
                <div class="info-item">
                    <span class="label">Prize Pool</span>
                    <span class="value" id="prizePool">$0</span>
                </div>
                <div class="info-item">
                    <span class="label">Status</span>
                    <span class="value" id="gameStatus">Waiting</span>
                </div>
            </div>
        </div>
        
        <!-- Game Tabs -->
        <div class="game-tabs">
            <button class="tab-btn" data-game="16" onclick="switchGame('16')">#16 BIG GTO</button>
            <button class="tab-btn active" data-game="10" onclick="switchGame('10')">#10 BIG GTO</button>
            <button class="tab-btn" data-game="1000" onclick="switchGame('1000')">#1000 BIG GTO</button>
        </div>
        
        <!-- Called Numbers -->
        <div class="called-numbers-section">
            <h2>Caused Numbers <span class="count" id="calledCount">0/75</span></h2>
            <div class="called-numbers-grid" id="calledNumbers">
                <!-- Numbers appear here -->
                <span class="number called">17</span>
                <span class="number called">18</span>
                <span class="number called">19</span>
                <span class="number called">20</span>
                <span class="number">1704</span>
            </div>
        </div>
        
        <!-- Bingo Card Display -->
        <div class="bingo-card-container" id="cardContainer">
            <div class="card-header">
                <h3>Your Card</h3>
                <span class="card-id" id="cardId">#---</span>
            </div>
            
            <!-- Traditional Bingo Card (Game #10) -->
            <div class="bingo-card" id="traditionalCard" style="display: block;">
                <div class="bingo-header">
                    <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
                </div>
                <div id="bingoCardBody">
                    <!-- Generated dynamically -->
                </div>
            </div>
            
            <!-- Bin50 Card (Game #16) -->
            <div class="bin-card" id="binCard" style="display: none;">
                <div class="bin-header">#16 Bin(50)</div>
                <div id="binCardBody" class="bin-rows"></div>
            </div>
            
            <!-- Special Card (Game #1000) -->
            <div class="special-card" id="specialCard" style="display: none;">
                <div class="special-header">⭐ SPECIAL EDITION ⭐</div>
                <div id="specialCardBody" class="special-numbers"></div>
            </div>
        </div>
        
        <!-- Game Controls -->
        <div class="game-controls">
            <button class="bingo-btn pulse" onclick="checkBingo()" id="bingoBtn">
                🎯 BINGO!
            </button>
            <button class="buy-card-btn" onclick="location.href='select-card.html'">
                🃏 New Card
            </button>
        </div>
        
        <!-- Last Called -->
        <div class="last-called">
            <span class="label">Last Number:</span>
            <span class="number big" id="lastNumber">-</span>
        </div>
        
        <!-- Back Link -->
        <a href="index.html" class="back-link">← Back to Menu</a>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
